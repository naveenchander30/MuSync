services:
  postgres:
    image: postgres:15-alpine
    container_name: musync-postgres
    environment:
      POSTGRES_DB: musync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  musync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musync
    ports:
      - "5001:5001"
    environment:
      - AUTH_BASE_URL=${AUTH_BASE_URL:-http://localhost:5001}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/musync
      - MASTER_PASSWORD=${MASTER_PASSWORD:-change_me_in_production}
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
